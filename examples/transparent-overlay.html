<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
        }
        .text {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="text" id="label">LIVE</div>
    <script>
        const now = new Date();
        document.getElementById('label').textContent =
            'LIVE — ' + now.toLocaleTimeString();
        setInterval(() => {
            const t = new Date();
            document.getElementById('label').textContent =
                'LIVE — ' + t.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
