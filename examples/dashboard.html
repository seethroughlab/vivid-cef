<!DOCTYPE html>
<html>
<head>
    <style>
        * { box-sizing: border-box; margin: 0; }
        body {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            padding: 20px;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card {
            background: #14141f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 16px;
        }
        .card h3 { color: #8b8bff; font-size: 0.8em; text-transform: uppercase; margin-bottom: 8px; }
        .value { font-size: 2em; font-weight: bold; }
        .bar { height: 6px; background: #1a1a2a; border-radius: 3px; margin-top: 8px; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        .bar-fill.blue { background: linear-gradient(90deg, #667eea, #764ba2); }
        .bar-fill.green { background: linear-gradient(90deg, #00b894, #00cec9); }
        .bar-fill.orange { background: linear-gradient(90deg, #fdcb6e, #e17055); }
        .bar-fill.red { background: linear-gradient(90deg, #fd79a8, #e84393); }
        canvas { width: 100%; height: 80px; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card">
            <h3>CPU Usage</h3>
            <div class="value" id="cpu">0%</div>
            <div class="bar"><div class="bar-fill blue" id="cpu-bar" style="width:0%"></div></div>
        </div>
        <div class="card">
            <h3>Memory</h3>
            <div class="value" id="mem">0 MB</div>
            <div class="bar"><div class="bar-fill green" id="mem-bar" style="width:0%"></div></div>
        </div>
        <div class="card">
            <h3>Frame Rate</h3>
            <div class="value" id="fps">60 fps</div>
            <div class="bar"><div class="bar-fill orange" id="fps-bar" style="width:100%"></div></div>
        </div>
        <div class="card">
            <h3>GPU Load</h3>
            <div class="value" id="gpu">0%</div>
            <div class="bar"><div class="bar-fill red" id="gpu-bar" style="width:0%"></div></div>
        </div>
    </div>

    <script>
        function rand(min, max) { return min + Math.random() * (max - min); }
        function update() {
            const cpu = rand(15, 85);
            document.getElementById('cpu').textContent = cpu.toFixed(0) + '%';
            document.getElementById('cpu-bar').style.width = cpu + '%';

            const mem = rand(200, 800);
            document.getElementById('mem').textContent = mem.toFixed(0) + ' MB';
            document.getElementById('mem-bar').style.width = (mem / 1024 * 100) + '%';

            const fps = rand(45, 62);
            document.getElementById('fps').textContent = fps.toFixed(0) + ' fps';
            document.getElementById('fps-bar').style.width = (fps / 60 * 100) + '%';

            const gpu = rand(10, 70);
            document.getElementById('gpu').textContent = gpu.toFixed(0) + '%';
            document.getElementById('gpu-bar').style.width = gpu + '%';
        }
        setInterval(update, 500);
        update();
    </script>
</body>
</html>
