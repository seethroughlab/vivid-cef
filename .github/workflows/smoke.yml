name: Smoke Tests

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone vivid-core
        run: |
          rm -rf ${{ github.workspace }}/../vivid
          git clone --recurse-submodules https://github.com/seethroughlab/vivid.git ${{ github.workspace }}/../vivid

      - name: Reset vivid-core build dir
        run: rm -rf ${{ github.workspace }}/../vivid/build

      - name: Configure vivid-core
        run: |
          ARCH=$(uname -m)
          cmake -B ${{ github.workspace }}/../vivid/build -S ${{ github.workspace }}/../vivid -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_OSX_ARCHITECTURES=$ARCH

      - name: Create app bundle skeleton
        run: mkdir -p ${{ github.workspace }}/../vivid/build/vivid.app/Contents/PlugIns

      - name: Build test_demo_graphs and vivid core operators
        run: cmake --build ${{ github.workspace }}/../vivid/build --target test_demo_graphs operators -j$(sysctl -n hw.logicalcpu)

      - name: Clone vivid-3d
        run: |
          rm -rf ${{ github.workspace }}/../vivid-3d
          git clone --recurse-submodules https://github.com/seethroughlab/vivid-3d.git ${{ github.workspace }}/../vivid-3d

      - name: Configure vivid-3d
        run: |
          ARCH=$(uname -m)
          cmake -B ${{ github.workspace }}/../vivid-3d/build -S ${{ github.workspace }}/../vivid-3d -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_OSX_ARCHITECTURES=$ARCH -DVIVID_SRC_DIR=${{ github.workspace }}/../vivid -DVIVID_BUILD_DIR=${{ github.workspace }}/../vivid/build

      - name: Build vivid-3d operators
        run: cmake --build ${{ github.workspace }}/../vivid-3d/build --target operators -j$(sysctl -n hw.logicalcpu)

      - name: Copy vivid-3d operators to vivid build dir
        run: cp ${{ github.workspace }}/../vivid-3d/build/*.dylib ${{ github.workspace }}/../vivid/build/

      - name: Configure package (downloads CEF)
        run: |
          ARCH=$(uname -m)
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_OSX_ARCHITECTURES=$ARCH -DVIVID_SRC_DIR=${{ github.workspace }}/../vivid -DVIVID_BUILD_DIR=${{ github.workspace }}/../vivid/build

      - name: Build operators, helper, and deterministic tests
        run: cmake --build build --target browser browser_audio_in vivid-cef-helper test_browser_cef_gate test_browser_audio_bridge -j$(sysctl -n hw.logicalcpu)

      - name: Run vivid-cef deterministic tests
        run: cd build && ctest --output-on-failure -R vivid_cef_test_

      - name: Copy plugin, helper, and CEF framework to vivid build dir
        run: |
          cp build/*.dylib ${{ github.workspace }}/../vivid/build/
          cp build/vivid-cef-helper ${{ github.workspace }}/../vivid/build/
          cp -r "build/Chromium Embedded Framework.framework" ${{ github.workspace }}/../vivid/build/
          # CEF looks for ANGLE/SwiftShader dylibs next to the executable when no
          # GPU is available (e.g. headless CI). Copy them out of the framework.
          cp "build/Chromium Embedded Framework.framework/Libraries/"*.dylib ${{ github.workspace }}/../vivid/build/ || true
          cp "build/Chromium Embedded Framework.framework/Libraries/vk_swiftshader_icd.json" ${{ github.workspace }}/../vivid/build/ || true

      - name: Run smoke tests
        run: cd ${{ github.workspace }}/../vivid/build && ./test_demo_graphs ${{ github.workspace }}/graphs
