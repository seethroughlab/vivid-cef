name: Smoke Tests

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone vivid-core
        run: |
          rm -rf ${{ github.workspace }}/../vivid
          git clone --recurse-submodules https://github.com/seethroughlab/vivid.git ${{ github.workspace }}/../vivid

      - name: Reset vivid-core build dir
        run: rm -rf ${{ github.workspace }}/../vivid/build

      - name: Configure vivid-core
        run: cmake -B ${{ github.workspace }}/../vivid/build -S ${{ github.workspace }}/../vivid -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Create app bundle skeleton
        run: mkdir -p ${{ github.workspace }}/../vivid/build/vivid.app/Contents/PlugIns

      - name: Build test_demo_graphs and vivid core operators
        run: cmake --build ${{ github.workspace }}/../vivid/build --target test_demo_graphs operators -j$(sysctl -n hw.logicalcpu)

      - name: Configure package (downloads CEF)
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_OSX_ARCHITECTURES=arm64 -DVIVID_SRC_DIR=${{ github.workspace }}/../vivid -DVIVID_BUILD_DIR=${{ github.workspace }}/../vivid/build

      - name: Build operators and helper
        run: cmake --build build --target browser vivid-cef-helper -j$(sysctl -n hw.logicalcpu)

      - name: Copy plugin, helper, and CEF framework to vivid build dir
        run: |
          cp build/*.dylib ${{ github.workspace }}/../vivid/build/
          cp build/vivid-cef-helper ${{ github.workspace }}/../vivid/build/
          cp -r "build/Chromium Embedded Framework.framework" ${{ github.workspace }}/../vivid/build/

      - name: Run smoke tests
        run: cd ${{ github.workspace }}/../vivid/build && ./test_demo_graphs ${{ github.workspace }}/graphs
